lar, qishloq xo‘jalik o’simliklari poyalari asosidagi materiallar."]}, {"q": "97. Gaz hosil qilish usuli yordamida qanday beton  tayyorlanadi?", "opts": ["gaz-beton va gazli silikat", "shlakli-beton va gazli silikat", "gaz-beton va shlakli beton", "Xamma javob to‘g‘ri"]}, {"q": "98. Mineral paxtaning issiqlik izolatsiya xususiyatlari — paxtada barcha mumkin bo‘lgan yo‘nalishlarda joylashgan tolalar orasidagi katta miqdordagi havo bo‘shliqlari umumiy hajmini  necha foizgacha bo‘ladi?", "opts": ["paxta umumiy hajmining 97% gacha", "paxta umumiy hajmining 80% gacha", "paxta umumiy hajmining 85% gacha", "paxta umumiy hajmining 90% gacha"]}, {"q": "100. Zavodlar ishlab chiqarayotgan paxtada 7 mkdan kam diametrli tolalar soni necha foizni tashkil qiladi?", "opts": ["80—90%", "70—80%", "60—70%", "85—95%"]}];

var PER_PAGE = 10;
var shuffled = [], pageIndex = 0, answers = [], totalPages = 0, done = false;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function init() {
  shuffled = shuffle(ALL_QUESTIONS);
  pageIndex = 0;
  answers = new Array(shuffled.length).fill(null);
  done = false;
  totalPages = Math.ceil(shuffled.length / PER_PAGE);
  render();
}

function getPageQ() {
  var s = pageIndex * PER_PAGE;
  return shuffled.slice(s, Math.min(s + PER_PAGE, shuffled.length));
}

function answer(gi, oi) {
  if (answers[gi] !== null) return;
  answers[gi] = oi;
  render();
  var ps = pageIndex * PER_PAGE;
  var qs = getPageQ();
  for (var i = 0; i < qs.length; i++) {
    if (answers[ps + i] === null) {
      var el = document.getElementById("qc" + (ps + i));
      if (el) el.scrollIntoView({behavior:"smooth", block:"start"});
      return;
    }
  }
  var btn = document.getElementById("btnNext");
  if (btn) btn.scrollIntoView({behavior:"smooth", block:"nearest"});
}

function nextPage() { pageIndex++; render(); window.scrollTo({top:0,behavior:"smooth"}); }
function finish() { done = true; render(); window.scrollTo({top:0,behavior:"smooth"}); }

function render() {
  var area = document.getElementById("quizArea");
  if (done) { area.innerHTML = buildResult(); return; }

  var qs = getPageQ();
  var ps = pageIndex * PER_PAGE;
  var allAnswered = qs.every(function(_, i) { return answers[ps + i] !== null; });
  var correctSoFar = 0, wrongSoFar = 0, remaining = 0;
  for (var i = 0; i < answers.length; i++) {
    if (answers[i] === null) remaining++;
    else if (answers[i] === 0) correctSoFar++;
    else wrongSoFar++;
  }
  var progressPct = Math.round((shuffled.length - remaining) / shuffled.length * 100);
  var letters = ["A","B","C","D"];

  var html = "";
  html += "<div class=\"stats-bar\">";
  html += "<div class=\"stat-card correct\"><div class=\"num\">" + correctSoFar + "</div><div class=\"lbl\">To&apos;g&apos;ri</div></div>";
  html += "<div class=\"stat-card wrong\"><div class=\"num\">" + wrongSoFar + "</div><div class=\"lbl\">Noto&apos;g&apos;ri</div></div>";
  html += "<div class=\"stat-card remain\"><div class=\"num\">" + remaining + "</div><div class=\"lbl\">Qolgan</div></div>";
  html += "</div>";
  html += "<div class=\"progress-wrap\"><div class=\"progress-label\"><span>Sahifa " + (pageIndex+1) + " / " + totalPages + "</span><span>" + progressPct + "%</span></div>";
  html += "<div class=\"progress-bar\"><div class=\"progress-fill\" style=\"width:" + progressPct + "%\"></div></div></div>";

  for (var i = 0; i < qs.length; i++) {
    var gi = ps + i;
    var q = qs[i];
    var ans = answers[gi];
    var isAns = ans !== null;
    html += "<div class=\"q-card\" id=\"qc" + gi + "\">";
    html += "<div class=\"q-num\">Savol " + (gi+1) + " / " + shuffled.length + "</div>";
    html += "<div class=\"q-text\">" + esc(q.q) + "</div>";
    html += "<div class=\"options\">";
    for (var oi = 0; oi < q.opts.length; oi++) {
      var cls = "opt-btn";
      if (isAns) {
        if (oi === 0) cls += " correct";
        else if (oi === ans) cls += " wrong";
      }
      html += "<button class=\"" + cls + "\" " + (isAns ? "disabled" : "") + " onclick=\"answer(" + gi + "," + oi + ")\"><span class=\"opt-letter\">" + letters[oi] + "</span><span>" + esc(q.opts[oi]) + "</span></button>";
    }
    html += "</div>";
    if (isAns) {
      if (ans === 0) html += "<div class=\"feedback ok show\">To&apos;g&apos;ri javob!</div>";
      else html += "<div class=\"feedback err show\">Noto&apos;g&apos;ri. To&apos;g&apos;ri: " + esc(q.opts[0]) + "</div>";
    }
    html += "</div>";
  }

  var nextLabel = pageIndex < totalPages - 1 ? "Keyingi sahifa &rarr;" : "Yakunlash";
  var nextFn = pageIndex < totalPages - 1 ? "nextPage()" : "finish()";
  html += "<div class=\"nav-row\"><button id=\"btnNext\" class=\"btn-next" + (allAnswered ? " show" : "") + "\" onclick=\"" + nextFn + "\">" + nextLabel + "</button></div>";

  area.innerHTML = html;
}

function buildResult() {
  var correct = 0, wrong = 0;
  for (var i = 0; i < answers.length; i++) {
    if (answers[i] === 0) correct++;
    else if (answers[i] !== null) wrong++;
  }
  var pct = Math.round(correct / shuffled.length * 100);
  var pass = pct >= 70;
  var html = "<div class=\"result-screen\">";
  html += "<div class=\"result-circle " + (pass?"pass":"fail") + "\">" + pct + "%</div>";
  html += "<div class=\"result-title\">" + (pass ? "Ajoyib natija!" : "Yana o&apos;qish kerak") + "</div>";
  html += "<div class=\"result-sub\">" + shuffled.length + " ta savoldan " + correct + " ta to&apos;g&apos;ri</div>";
  html += "<div class=\"result-grid\">";
  html += "<div class=\"result-item\"><div class=\"ri-num\" style=\"color:#16a34a\">" + correct + "</div><div class=\"ri-lbl\">To&apos;g&apos;ri</div></div>";
  html += "<div class=\"result-item\"><div class=\"ri-num\" style=\"color:#dc2626\">" + wrong + "</div><div class=\"ri-lbl\">Noto&apos;g&apos;ri</div></div>";
  html += "<div class=\"result-item\"><div class=\"ri-num\" style=\"color:#2563eb\">" + pct + "%</div><div class=\"ri-lbl\">Ball</div></div>";
  html += "</div>";
  html += "<button class=\"btn-restart\" onclick=\"init()\">Qaytadan boshlash</button></div>";
  return html;
}

init();
</script>
